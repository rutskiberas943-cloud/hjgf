<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feirão de Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#ff2e63,#ff4f7b,#ff6b8f);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* CARD */

.container{
max-width:420px;
width:100%;
background:white;
border-radius:22px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* BANNER */

.banner{
background:linear-gradient(90deg,#ff2e63,#ff4f7b);
color:white;
text-align:center;
padding:25px;
}

.banner h1{
font-size:40px;
font-weight:800;
letter-spacing:2px;
}

/* CONTEUDO */

.content{
padding:30px;
text-align:center;
}

.subtitle{
font-size:16px;
color:#444;
margin-bottom:20px;
}

/* SELO */

.badge{
display:inline-block;
background:#ffe5ec;
color:#c9184a;
padding:8px 15px;
border-radius:20px;
font-size:13px;
font-weight:600;
margin-bottom:20px;
}

/* BENEFICIOS */

.benefits{
text-align:left;
margin-bottom:25px;
}

.benefits div{
margin-bottom:10px;
font-size:15px;
}

/* BOTAO */

.cta{
display:block;
background:linear-gradient(90deg,#ff2e63,#ff4f7b);
color:white;
text-decoration:none;
padding:18px;
border-radius:12px;
font-weight:700;
font-size:18px;
transition:.3s;
box-shadow:0 10px 25px rgba(255,0,90,0.4);
}

.cta:hover{
transform:scale(1.05);
}

/* AVISO */

.notice{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<h1>FEIRÃO</h1>
</div>

<div class="content">

<div class="badge">
OFERTAS DISPONÍVEIS HOJE
</div>

<div class="subtitle">
Confira as oportunidades disponíveis e veja se você pode aproveitar as ofertas.
</div>

<div class="benefits">
<div>✔ Descontos especiais disponíveis</div>
<div>✔ Acesso rápido às ofertas</div>
<div>✔ Processo simples</div>
</div>

<a class="cta" href="https://consultoria-roberta-online2026.netlify.app/">
VER OFERTAS DISPONÍVEIS
</a>

<div class="notice">
Você será direcionado para a página oficial de ofertas.
</div>

</div>

</div>

</body>
</html>
